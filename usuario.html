<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Usuário</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body class="bg-light">
  <main class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
      <div class="col-12 col-sm-8 col-md-6 col-lg-4">
        <div class="card shadow-sm bg-warning">
          <div class="card-body p-4">
            <h1 class="h3 text-center mb-4">Usuário</h1>

            <form action="listausuario.html" method="get">
              <div class="mb-3">
                <label for="nome" class="form-label">Nome</label>
                <input type="text" class="form-control" id="nome" name="nome" required placeholder="João" />
              </div>

              <div class="mb-3">
                <label for="sobrenome" class="form-label">Sobrenome</label>
                <input type="text" class="form-control" id="sobrenome" name="sobrenome" required placeholder="Silva" />
              </div>

              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email" required
                  placeholder="joao@gmail.com" />
              </div>

              <div class="mb-3">
                <label for="telefone" class="form-label">Telefone</label>
                <input type="tel" class="form-control" id="telefone" name="telefone" required placeholder="47989898" />
              </div>

              <div class="mb-3">
                <label for="senha" class="form-label">Senha</label>
                <input type="password" class="form-control" id="senha" name="senha" required placeholder="minhasenha123" />
              </div>

              <div class="mb-3">
                <label for="dataCadastro" class="form-label">Data de Cadastro</label>
                <input type="date" class="form-control" id="dataCadastro" name="dataCadastro" required
                  placeholder="10/05/2023" />
              </div>

              <div class="d-flex justify-content-center gap-5">
                <button type="submit" class="btn btn-primary w-50 rounded-pill py-2">
                  Confirmar
                </button>

                <a href="listausuario.html" class="btn btn-secondary w-50 rounded-pill py-2">
                  Fechar
                </a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
