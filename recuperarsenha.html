<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recuperar Senha</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body class="bg-light">
    <main class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-12 col-sm-8 col-md-6 col-lg-4">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h1 class="h3 text-center mb-4">Recuperar Senha</h1>

                        <form action="login.html" method="get">
                            <div class="mb-3">
                                <label for="email" class="form-label">E-mail</label>
                                <input type="email" class="form-control" id="email" name="email" required
                                    placeholder="Digite seu e-mail" />
                            </div>

                            <button type="submit" class="btn btn-primary w-100 rounded-pill p-2 mb-3">
                                Confirmar
                            </button>

                            <div class="d-flex flex-column align-items-center w-100 mt-2">
                                <div class="text-start" style="max-width: 280px">
                                    <p class="small mb-2 text-muted lh-sm">
                                        Ao confirmar será criada uma nova senha temporária.
                                    </p>
                                    <p class="small mb-0 text-muted lh-sm">
                                        A senha temporária deve ser <strong>"senha123"</strong>.
                                    </p>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
